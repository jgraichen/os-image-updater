# See: https://docs.openstack.org/glance/latest/admin/useful-image-properties.html
default: &default
  architecture: x86_64
  hypervisor_type: qemu
  vm_mode: hvm
  hw_disk_bus: scsi
  hw_qemu_guest_agent: yes
  hw_scsi_model: virtio-scsi
  os_require_quiesce: yes
  os_type: linux

images:
  debian-13:
    image_url: https://cloud.debian.org/images/cloud/bookworm/latest/debian-13-genericcloud-amd64.qcow2
    checksums_url: https://cloud.debian.org/images/cloud/bookworm/latest/SHA512SUMS
    min_disk: 5 # GB
    min_ram: 128 # MB
    properties:
      <<: *default
      os_codename: trixie
      os_distro: debian
      os_flavor: cloud
      os_version: 13
      os_admin_user: debian

  ubuntu-24.04:
    image_url: https://cloud-images.ubuntu.com/releases/noble/release/ubuntu-24.04-server-cloudimg-amd64.img
    checksums_url: https://cloud-images.ubuntu.com/releases/noble/release/SHA256SUMS
    min_disk: 5 # GB
    min_ram: 128 # MB
    properties:
      <<: *default
      os_codename: noble
      os_distro: ubuntu
      os_flavor: cloud
      os_version: 24.04
      os_admin_user: ubuntu

  ubuntu-24.04-minimal:
    image_url: https://cloud-images.ubuntu.com/minimal/releases/noble/release/ubuntu-24.04-minimal-cloudimg-amd64.img
    checksums_url: https://cloud-images.ubuntu.com/minimal/releases/noble/release/SHA256SUMS
    min_disk: 5 # GB
    min_ram: 128 # MB
    properties:
      <<: *default
      os_codename: noble
      os_distro: ubuntu
      os_flavor: cloud-minimal
      os_version: 24.04
      os_admin_user: ubuntu

  rocky-10:
    image_url: https://dl.rockylinux.org/pub/rocky/10/images/x86_64/Rocky-10-GenericCloud-Base.latest.x86_64.qcow2
    checksums_url: https://dl.rockylinux.org/pub/rocky/10/images/x86_64/CHECKSUM
    min_disk: 10 # GB
    min_ram: 128 # MB
    properties:
      <<: *default
      os_distro: rocky
      os_flavor: cloud
      os_version: 10
      os_admin_user: rocky

  flatcar:
    image_url: https://stable.release.flatcar-linux.net/amd64-usr/current/flatcar_production_openstack_image.img
    checksums_url: https://stable.release.flatcar-linux.net/amd64-usr/current/flatcar_production_openstack_image.img.DIGESTS
    min_disk: 10 # GB
    min_ram: 128 # MB
    properties:
      <<: *default
      os_distro: flatcar
      os_admin_user: core
